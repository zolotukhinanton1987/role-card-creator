<h1>🧪 Unit Tests — Карта Посади Create</h1>
<div class="subtitle">Тестування утиліт, валідації та генерації документу</div>

<div id="testOutput"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// COPY OF UTILITIES FROM index.html (for isolated testing)
// ═══════════════════════════════════════════════════════════════════

function parseLines(text) {
  if (!text || typeof text !== 'string') return [];
  return text.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0);
}

function sanitize(text) {
  if (!text) return '';
  return String(text).replace(/[<>&"']/g, c => ({
    '<':'&lt;', '>':'&gt;', '&':'&amp;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

// ═══════════════════════════════════════════════════════════════════
// VALIDATORS (mirrors index.html logic, testable without DOM)
// ═══════════════════════════════════════════════════════════════════

function validatePositionName(val) {
  if (!val || !val.trim()) return 'empty';
  return null;
}

function validateNarrative(val) {
  if (!val || val.trim().length < 50) return 'too_short';
  return null;
}

function validateZones(zones) {
  if (!zones || zones.length === 0) return 'no_zones';
  if (zones.length > 5) return 'too_many';
  for (const zone of zones) {
    if (!zone.name || !zone.name.trim()) return 'incomplete_zone';
    if (!zone.responsibilities || zone.responsibilities.length < 2) return 'incomplete_zone';
    if (!zone.sense || !zone.sense.trim()) return 'incomplete_zone';
  }
  return null;
}

function validateResults(lines) {
  if (!lines || lines.length < 2) return 'too_few';
  return null;
}

function validateKpi(lines) {
  if (!lines || lines.length < 3) return 'too_few';
  return null;
}

function validateOrgStructure(adminSub, funcSub, directReports) {
  if (!adminSub || !adminSub.trim()) return 'incomplete';
  if (!funcSub || !funcSub.trim()) return 'incomplete';
  if (!directReports || directReports.length < 1) return 'incomplete';
  return null;
}

// ═══════════════════════════════════════════════════════════════════
// MINIMAL TEST FRAMEWORK
// ═══════════════════════════════════════════════════════════════════
const results = { pass: 0, fail: 0, skip: 0, suites: [] };
let currentSuite = null;

function describe(name, fn) {
  currentSuite = { name, tests: [] };
  results.suites.push(currentSuite);
  fn();
  currentSuite = null;
}

function it(name, fn) {
  const test = { name, status: 'pending', error: null };
  if (currentSuite) currentSuite.tests.push(test);
  try {
    fn();
    test.status = 'pass';
    results.pass++;
  } catch (e) {
    test.status = 'fail';
    test.error = e.message || String(e);
    results.fail++;
  }
}

function xtest(name) {
  const test = { name, status: 'skip', error: null };
  if (currentSuite) currentSuite.tests.push(test);
  results.skip++;
}

function expect(actual) {
  return {
    toBe(expected) {
      if (actual !== expected) throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    },
    toEqual(expected) {
      const a = JSON.stringify(actual), b = JSON.stringify(expected);
      if (a !== b) throw new Error(`Expected ${b}, got ${a}`);
    },
    toBeNull() {
      if (actual !== null) throw new Error(`Expected null, got ${JSON.stringify(actual)}`);
    },
    not: {
      toBeNull() {
        if (actual === null) throw new Error('Expected non-null value');
      },
      toBe(expected) {
        if (actual === expected) throw new Error(`Expected value to NOT be ${JSON.stringify(expected)}`);
      }
    },
    toHaveLength(n) {
      if (!actual || actual.length !== n) throw new Error(`Expected length ${n}, got ${actual?.length}`);
    },
    toContain(item) {
      if (!actual || !actual.includes(item)) throw new Error(`Expected ${JSON.stringify(actual)} to contain ${JSON.stringify(item)}`);
    },
    toBeGreaterThan(n) {
      if (!(actual > n)) throw new Error(`Expected ${actual} > ${n}`);
    },
    toBeTruthy() {
      if (!actual) throw new Error(`Expected truthy, got ${JSON.stringify(actual)}`);
    },
    toBeFalsy() {
      if (actual) throw new Error(`Expected falsy, got ${JSON.stringify(actual)}`);
    }
  };
}

// ═══════════════════════════════════════════════════════════════════
// TESTS
// ═══════════════════════════════════════════════════════════════════

function defineTests() {

  // ── 1. parseLines ──────────────────────────────────────────────
  describe('parseLines()', () => {
    it('should return empty array for null', () => {
      expect(parseLines(null)).toEqual([]);
    });
    it('should return empty array for empty string', () => {
      expect(parseLines('')).toEqual([]);
    });
    it('should parse single line', () => {
      expect(parseLines('Операційний директор')).toEqual(['Операційний директор']);
    });
    it('should parse multiple lines', () => {
      expect(parseLines('рядок 1\nрядок 2\nрядок 3')).toHaveLength(3);
    });
    it('should trim whitespace from lines', () => {
      expect(parseLines('  рядок 1  \n  рядок 2  ')).toEqual(['рядок 1', 'рядок 2']);
    });
    it('should filter empty lines', () => {
      expect(parseLines('рядок 1\n\n\nрядок 2')).toHaveLength(2);
    });
    it('should handle Windows line endings', () => {
      expect(parseLines('рядок 1\r\nрядок 2')).toHaveLength(2);
    });
    it('should return empty array for non-string', () => {
      expect(parseLines(42)).toEqual([]);
      expect(parseLines({})).toEqual([]);
      expect(parseLines(undefined)).toEqual([]);
    });
    it('corner: should handle line with only spaces', () => {
      expect(parseLines('   \n   \nрядок')).toEqual(['рядок']);
    });
    it('corner: should handle very long line', () => {
      const long = 'а'.repeat(10000);
      expect(parseLines(long)).toHaveLength(1);
    });
    it('corner: should handle unicode/emoji in text', () => {
      expect(parseLines('🚀 Ракета\n✓ Успіх')).toHaveLength(2);
    });
    it('corner: should handle special characters', () => {
      const result = parseLines('<script>alert(1)</script>\nnormal');
      expect(result).toHaveLength(2);
    });
  });

  // ── 2. sanitize ────────────────────────────────────────────────
  describe('sanitize()', () => {
    it('should escape < and >', () => {
      const result = sanitize('<script>');
      expect(result).toBe('&lt;script&gt;');
    });
    it('should escape &', () => {
      expect(sanitize('A & B')).toBe('A &amp; B');
    });
    it('should escape quotes', () => {
      expect(sanitize('"hello"')).toBe('&quot;hello&quot;');
    });
    it("should escape single quotes", () => {
      expect(sanitize("it's")).toBe('it&#39;s');
    });
    it('should return empty string for null', () => {
      expect(sanitize(null)).toBe('');
    });
    it('should return empty string for undefined', () => {
      expect(sanitize(undefined)).toBe('');
    });
    it('should not modify clean text', () => {
      expect(sanitize('Операційний директор')).toBe('Операційний директор');
    });
    it('corner: multiple special chars in one string', () => {
      const result = sanitize('<b>"A & B"</b>');
      expect(result).toContain('&lt;');
      expect(result).toContain('&gt;');
      expect(result).toContain('&amp;');
    });
  });

  // ── 3. validatePositionName ────────────────────────────────────
  describe('validatePositionName()', () => {
    it('should return null for valid name', () => {
      expect(validatePositionName('Операційний директор')).toBeNull();
    });
    it('should return error for empty string', () => {
      expect(validatePositionName('')).not.toBeNull();
    });
    it('should return error for null', () => {
      expect(validatePositionName(null)).not.toBeNull();
    });
    it('should return error for whitespace only', () => {
      expect(validatePositionName('   ')).not.toBeNull();
    });
    it('corner: single character should pass', () => {
      expect(validatePositionName('A')).toBeNull();
    });
    it('corner: very long name should pass', () => {
      expect(validatePositionName('А'.repeat(200))).toBeNull();
    });
  });

  // ── 4. validateNarrative ───────────────────────────────────────
  describe('validateNarrative()', () => {
    it('should return null for sufficient text', () => {
      const text = 'У 2026 роках бізнес переходить у фазу активного зростання та розвитку продуктів і послуг.';
      expect(validateNarrative(text)).toBeNull();
    });
    it('should return error for short text', () => {
      expect(validateNarrative('Короткий текст')).not.toBeNull();
    });
    it('should return error for empty string', () => {
      expect(validateNarrative('')).not.toBeNull();
    });
    it('should return error for null', () => {
      expect(validateNarrative(null)).not.toBeNull();
    });
    it('corner: exactly 50 chars should pass', () => {
      expect(validateNarrative('А'.repeat(50))).toBeNull();
    });
    it('corner: 49 chars should fail', () => {
      expect(validateNarrative('А'.repeat(49))).not.toBeNull();
    });
  });

  // ── 5. validateZones ───────────────────────────────────────────
  describe('validateZones()', () => {
    const validZone = {
      name: 'Допуск угод в операційне виконання',
      responsibilities: ['встановлення правил', 'перевірку здійсненності угод'],
      sense: 'На цьому етапі закладається валовий прибуток.'
    };

    it('should return null for valid zones array', () => {
      expect(validateZones([validZone])).toBeNull();
    });
    it('should return error for empty array', () => {
      expect(validateZones([])).not.toBeNull();
    });
    it('should return error for null', () => {
      expect(validateZones(null)).not.toBeNull();
    });
    it('should return error if zone has no name', () => {
      expect(validateZones([{ ...validZone, name: '' }])).not.toBeNull();
    });
    it('should return error if zone has only 1 responsibility', () => {
      expect(validateZones([{ ...validZone, responsibilities: ['тільки одна'] }])).not.toBeNull();
    });
    it('should return error if zone has no sense', () => {
      expect(validateZones([{ ...validZone, sense: '' }])).not.toBeNull();
    });
    it('should return error for more than 5 zones', () => {
      const many = Array(6).fill(validZone);
      expect(validateZones(many)).not.toBeNull();
    });
    it('should allow up to 5 zones', () => {
      const five = Array(5).fill(validZone);
      expect(validateZones(five)).toBeNull();
    });
    it('corner: zone with whitespace-only name should fail', () => {
      expect(validateZones([{ ...validZone, name: '   ' }])).not.toBeNull();
    });
    it('corner: zone with empty responsibilities array should fail', () => {
      expect(validateZones([{ ...validZone, responsibilities: [] }])).not.toBeNull();
    });
  });

  // ── 6. validateResults ─────────────────────────────────────────
  describe('validateResults()', () => {
    it('should return null for 2+ results', () => {
      expect(validateResults(['Результат 1', 'Результат 2'])).toBeNull();
    });
    it('should return error for 1 result', () => {
      expect(validateResults(['Лише один'])).not.toBeNull();
    });
    it('should return error for empty array', () => {
      expect(validateResults([])).not.toBeNull();
    });
    it('should return error for null', () => {
      expect(validateResults(null)).not.toBeNull();
    });
    it('corner: exactly 2 should pass', () => {
      expect(validateResults(['р1', 'р2'])).toBeNull();
    });
    it('corner: 10 results should pass', () => {
      expect(validateResults(Array(10).fill('результат'))).toBeNull();
    });
  });

  // ── 7. validateKpi ─────────────────────────────────────────────
  describe('validateKpi()', () => {
    it('should return null for 3+ KPIs', () => {
      expect(validateKpi(['KPI 1', 'KPI 2', 'KPI 3'])).toBeNull();
    });
    it('should return error for 2 KPIs', () => {
      expect(validateKpi(['KPI 1', 'KPI 2'])).not.toBeNull();
    });
    it('should return error for empty array', () => {
      expect(validateKpi([])).not.toBeNull();
    });
    it('corner: exactly 3 should pass', () => {
      expect(validateKpi(['k1', 'k2', 'k3'])).toBeNull();
    });
  });

  // ── 8. validateOrgStructure ────────────────────────────────────
  describe('validateOrgStructure()', () => {
    it('should return null for complete org structure', () => {
      expect(validateOrgStructure(
        'Керівнику Компанії',
        'COO Керуючої Компанії',
        ['Операційний Менеджер']
      )).toBeNull();
    });
    it('should return error if adminSub is missing', () => {
      expect(validateOrgStructure('', 'COO', ['Підлеглий'])).not.toBeNull();
    });
    it('should return error if funcSub is missing', () => {
      expect(validateOrgStructure('Керівник', '', ['Підлеглий'])).not.toBeNull();
    });
    it('should return error if directReports is empty', () => {
      expect(validateOrgStructure('Керівник', 'COO', [])).not.toBeNull();
    });
    it('corner: whitespace-only adminSub should fail', () => {
      expect(validateOrgStructure('   ', 'COO', ['Підлеглий'])).not.toBeNull();
    });
    it('corner: multiple direct reports should pass', () => {
      expect(validateOrgStructure(
        'Керівник',
        'COO',
        ['PM1', 'PM2', 'PM3']
      )).toBeNull();
    });
  });

  // ── 9. parseLines integration with validator ───────────────────
  describe('parseLines + validateResults integration', () => {
    it('two lines in textarea should pass results validation', () => {
      const text = 'Зростання прибутку\nЗменшення відхилень';
      const lines = parseLines(text);
      expect(validateResults(lines)).toBeNull();
    });
    it('one line in textarea should fail results validation', () => {
      const lines = parseLines('Лише один результат');
      expect(validateResults(lines)).not.toBeNull();
    });
    it('blank lines between entries should not count', () => {
      const lines = parseLines('рядок 1\n\n\nрядок 2');
      expect(lines).toHaveLength(2);
      expect(validateResults(lines)).toBeNull();
    });
  });

  // ── 10. SMOKE TEST: Document generation ───────────────────────
  describe('SMOKE: buildDocument()', () => {
    const sampleData = {
      positionName: 'Операційний директор компанії',
      narrative: 'У 2026-2027 роках бізнес переходить у фазу активного зростання. Збільшується виручка та складність операційних ланцюгів. Формується роль Операційного директора для управління цими процесами.',
      zones: [
        {
          name: 'Допуск угод в операційне виконання',
          responsibilities: [
            'встановлення правил допуску угод',
            'перевірку операційної здійсненності угод',
            'блокування угод з ризиком втрати прибутку'
          ],
          sense: 'На цьому етапі закладається або зберігається валовий прибуток бізнесу.'
        },
        {
          name: 'Управління операційними втратами',
          responsibilities: [
            'визначення того що вважається операційними втратами',
            'забезпечення вимірюваності операційних втрат'
          ],
          sense: 'Операційний прибуток формується через контроль втрат.'
        }
      ],
      results: [
        'Сформована стратегія операційної ефективності',
        'Зростання валового та операційного прибутку',
        'Зменшення прострокованого незавершеного виробництва'
      ],
      kpi: [
        'Операційна прибутковість (% значення за період)',
        'Валовий прибуток (абсолютне значення за місяць)',
        'Частка прострокованого НВ до НВ (%)',
        'Зростання валового прибутку кварт-до-кварт'
      ],
      adminSub: 'Керівнику Компанії',
      funcSub: 'COO Керуючої Компанії',
      directReports: ['Операційний Менеджер(и)', 'Процесний Менеджер', 'Проєктні менеджери']
    };

    it('should generate a Blob from valid data', async () => {
      if (typeof window.docx === 'undefined') {
        throw new Error('docx library not loaded');
      }
      const blob = await buildDocument(sampleData);
      if (!(blob instanceof Blob)) throw new Error('Expected Blob, got ' + typeof blob);
    });

    it('should generate a non-empty document', async () => {
      if (typeof window.docx === 'undefined') {
        throw new Error('docx library not loaded');
      }
      const blob = await buildDocument(sampleData);
      if (blob.size < 1000) throw new Error(`Blob too small: ${blob.size} bytes`);
    });

    it('corner: should handle special chars in position name', async () => {
      if (typeof window.docx === 'undefined') return;
      const data = { ...sampleData, positionName: 'Head of <Operations> & "Strategy"' };
      const blob = await buildDocument(data);
      if (!(blob instanceof Blob)) throw new Error('Expected Blob');
    });

    it('corner: should handle single zone (minimum)', async () => {
      if (typeof window.docx === 'undefined') return;
      const data = { ...sampleData, zones: [sampleData.zones[0]] };
      const blob = await buildDocument(data);
      if (!(blob instanceof Blob)) throw new Error('Expected Blob');
    });

    it('corner: should handle 5 zones (maximum)', async () => {
      if (typeof window.docx === 'undefined') return;
      const data = { ...sampleData, zones: Array(5).fill(sampleData.zones[0]) };
      const blob = await buildDocument(data);
      if (!(blob instanceof Blob)) throw new Error('Expected Blob');
    });

    it('corner: should handle very long narrative', async () => {
      if (typeof window.docx === 'undefined') return;
      const data = { ...sampleData, narrative: 'Дуже довгий наратив. '.repeat(100) };
      const blob = await buildDocument(data);
      if (!(blob instanceof Blob)) throw new Error('Expected Blob');
    });

    it('corner: should handle multi-paragraph narrative', async () => {
      if (typeof window.docx === 'undefined') return;
      const data = { ...sampleData, narrative: 'Перший абзац.\n\nДругий абзац.\n\nТретій абзац.' };
      const blob = await buildDocument(data);
      if (!(blob instanceof Blob)) throw new Error('Expected Blob');
    });
  });

}

// ═══════════════════════════════════════════════════════════════════
// DOCX buildDocument (same as index.html) for testing
// ═══════════════════════════════════════════════════════════════════
async function buildDocument(data) {
  const {
    Document, Packer, Paragraph, TextRun,
    AlignmentType, LevelFormat
  } = window.docx;

  function run(text, opts = {}) {
    return new TextRun({
      text: String(text),
      font: 'Consolas',
      size: opts.size || 24,
      bold: opts.bold || false,
      underline: opts.underline ? { type: 'single' } : undefined,
      highlight: opts.highlight || undefined,
      color: '000000'
    });
  }

  const spacing = { before: 0, after: 120, line: 276, lineRule: 'auto' };

  function para(children, align = 'left') {
    return new Paragraph({
      children,
      alignment: align === 'center' ? AlignmentType.CENTER : AlignmentType.LEFT,
      spacing
    });
  }

  function bulletPara(text) {
    return new Paragraph({
      children: [run(text)],
      numbering: { reference: 'bullets', level: 0 },
      spacing,
      alignment: AlignmentType.LEFT
    });
  }

  function emptyPara() {
    return new Paragraph({ children: [run('')], spacing });
  }

  const paragraphs = [];
  paragraphs.push(para([run('Карта посади', { bold: true, size: 36 })], 'center'));
  paragraphs.push(para([run(data.positionName, { bold: true, size: 36, highlight: 'yellow' })], 'center'));
  paragraphs.push(emptyPara());
  paragraphs.push(para([run('Наратив', { bold: true, highlight: 'yellow' })]));
  data.narrative.split('\n').map(l => l.trim()).filter(Boolean).forEach(line => {
    paragraphs.push(para([run(line)]));
  });
  paragraphs.push(emptyPara());
  paragraphs.push(para([run('Зони відповідальності', { bold: true, highlight: 'yellow' })]));
  paragraphs.push(emptyPara());
  data.zones.forEach((zone, i) => {
    paragraphs.push(para([run(`${i + 1}. ${zone.name}`, { bold: true, underline: true, highlight: 'yellow' })]));
    paragraphs.push(para([run('Відповідає за:', { highlight: 'lightGray' })]));
    zone.responsibilities.forEach(r => paragraphs.push(bulletPara(r)));
    paragraphs.push(para([
      run('Сенс відповідальності:', { highlight: 'lightGray' }),
      new TextRun({ break: 1 }),
      run(zone.sense)
    ]));
    if (i < data.zones.length - 1) paragraphs.push(emptyPara());
  });
  paragraphs.push(emptyPara());
  paragraphs.push(para([run('Очікувані результати', { bold: true, highlight: 'yellow' })]));
  data.results.forEach(r => paragraphs.push(bulletPara(r)));
  paragraphs.push(emptyPara());
  paragraphs.push(para([run('Критерії перевірки', { bold: true, highlight: 'yellow' })]));
  data.kpi.forEach(k => paragraphs.push(bulletPara(k)));
  paragraphs.push(emptyPara());
  paragraphs.push(para([run('Місце в організаційній структурі', { bold: true, highlight: 'yellow' })]));
  paragraphs.push(para([
    run('Адміністративне підпорядкування:', { bold: true, highlight: 'lightGray' }),
    new TextRun({ break: 1 }),
    run(data.adminSub)
  ]));
  paragraphs.push(para([
    run('Функціональне підпорядкування:', { bold: true, highlight: 'lightGray' }),
    new TextRun({ break: 1 }),
    run(data.funcSub)
  ]));
  paragraphs.push(para([run('Прямі підлеглі:', { bold: true, highlight: 'lightGray' })]));
  data.directReports.forEach(r => paragraphs.push(bulletPara(r)));

  const doc = new Document({
    numbering: {
      config: [{
        reference: 'bullets',
        levels: [{
          level: 0,
          format: LevelFormat.BULLET,
          text: '\u2022',
          alignment: AlignmentType.LEFT,
          style: {
            paragraph: { indent: { left: 720, hanging: 360 } },
            run: { font: 'Consolas', size: 24 }
          }
        }]
      }]
    },
    sections: [{
      properties: {
        page: {
          size: { width: 11906, height: 16838 },
          margin: { top: 1134, right: 1134, bottom: 1134, left: 1134 }
        }
      },
      children: paragraphs
    }]
  });

  return Packer.toBlob(doc);
}

          test.error = e.message || String(e);
          results.fail++;

      }

  // Handle async tests in describe (smoke tests use async in it())
  // Re-run async suites
  for (const suite of results.suites) {

        // already ran
      }

// Override 'it' to handle async
const syncIt = it;
const asyncTests = [];

function redefineIt() {
  window.it = function(name, fn) {
    const test = { name, status: 'pending', error: null };
    if (currentSuite) currentSuite.tests.push(test);
    const result = fn();
    if (result && typeof result.then === 'function') {
      asyncTests.push({ test, promise: result });
    } else {
      if (test.status === 'pending') {
        test.status = 'pass';
        results.pass++;
      }
    }
  };
}

async function runAllTests() {
  results.pass = 0;
  results.fail = 0;
  results.skip = 0;
  results.suites = [];
  asyncTests.length = 0;

  const output = document.getElementById('testOutput');
  output.innerHTML = '<div style="color:#64748b;margin-bottom:16px;">⏳ Запуск тестів...</div>';

  // Override it() to handle both sync and async
  window.it = function(name, fn) {
    const test = { name, status: 'pending', error: null };
    if (currentSuite) currentSuite.tests.push(test);

    let res;
    try {
      res = fn();
    } catch (e) {
      test.status = 'fail';
      test.error = e.message || String(e);
      results.fail++;
      return;
    }

    if (res && typeof res.then === 'function') {
      asyncTests.push({ test, promise: res });
    } else {
      test.status = 'pass';
      results.pass++;
    }
  };

  defineTests();

  // Await all async tests
  for (const { test, promise } of asyncTests) {
    try {
      await promise;
      test.status = 'pass';
      results.pass++;
    } catch (e) {
      test.status = 'fail';
      test.error = e.message || String(e);
      results.fail++;
    }
  }

  renderResults();
}

function renderResults() {
  const output = document.getElementById('testOutput');
  let html = '';

  for (const suite of results.suites) {
    html += `<div class="suite">`;
    html += `<div class="suite-name">${suite.name}</div>`;
    for (const test of suite.tests) {
      const cls = test.status;
      const badge = test.status === 'pass' ? '✓' : test.status === 'fail' ? '✗' : '○';
      html += `<div class="test ${cls}">
        <span class="badge">${badge}</span>
        <div class="test-name">
          <div>${test.name}</div>
          ${test.error ? `<div class="test-err">${test.error}</div>` : ''}
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  const total = results.pass + results.fail + results.skip;
  html += `<hr>
  <div class="summary">
    <div class="summary-item">
      <div class="label">ВСЬОГО</div>
      <div class="value">${total}</div>
    </div>
    <div class="summary-item">
      <div class="label">✓ ПРОЙШЛИ</div>
      <div class="value pass-val">${results.pass}</div>
    </div>
    <div class="summary-item">
      <div class="label">✗ ПРОВАЛИЛИ</div>
      <div class="value fail-val">${results.fail}</div>
    </div>
    <div class="summary-item">
      <div class="label">○ ПРОПУЩЕНІ</div>
      <div class="value skip-val">${results.skip}</div>
    </div>
  </div>`;

  if (results.fail === 0) {
    html += `<div style="margin-top:16px;padding:12px 16px;background:rgba(34,197,94,0.1);border-radius:8px;color:#22c55e;font-weight:700;">🎉 Всі тести пройшли успішно!</div>`;
  } else {
    html += `<div style="margin-top:16px;padding:12px 16px;background:rgba(239,68,68,0.1);border-radius:8px;color:#ef4444;font-weight:700;">⚠ ${results.fail} тест(ів) провалились. Перевірте помилки вище.</div>`;
  }

  output.innerHTML = html;
}

// Run tests automatically on load
window.addEventListener('load', () => {
  setTimeout(runAllTests, 500);
});
